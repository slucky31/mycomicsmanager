name: .NET Core

on:
  push:
    branches: [ master, develop, feature/* ]
  pull_request:
    branches: [ master, develop, feature/* ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - 
            name : Checkout
            uses: actions/checkout@v2
        - 
            name: Setup .NET Core
            uses: actions/setup-dotnet@v1
            with:
                dotnet-version: 5.0.100
        - 
            name: MyComicsManagerApi Install dependencies
            working-directory: MyComicsManagerApi
            run: dotnet restore
        - 
            name: MyComicsManagerApi Build
            working-directory: MyComicsManagerApi
            run: dotnet build --configuration Release --no-restore
        - 
            name: MyComicsManagerApi Test
            working-directory: MyComicsManagerApi
            run: dotnet test --no-restore --verbosity normal
        - 
            name: MyComicsManagerWeb Install dependencies
            working-directory: MyComicsManagerWeb
            run: dotnet restore
        - 
            name: MyComicsManagerWeb Build
            working-directory: MyComicsManagerWeb
            run: dotnet build --configuration Release --no-restore
        - 
            name: MyComicsManagerWeb Test
            working-directory: MyComicsManagerWeb
            run: dotnet test --no-restore --verbosity normal
  
            
  docker-web:
    needs: build
    runs-on: ubuntu-latest
    steps:      
        - 
            name: Check Out Repo 
            uses: actions/checkout@v2
        -
            name: Set up QEMU
            uses: docker/setup-qemu-action@v1
        -
            name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v1
        -
            name: Login to DockerHub
            uses: docker/login-action@v1
            with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}
        -
            name: Build and push
            uses: docker/build-push-action@v2
            with:
              context: MyComicsManagerWeb
              file: Dockerfile
              push: true
              tags: ${{ secrets.DOCKERHUB_USERNAME }}/mycomicsmanager-web:dev
