# Exclusions globales : fichiers générés, tiers, et artefacts de build
sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  **/coverage-report/**,\
  **/wwwroot/temp/**,\
  **/*.min.js,\
  **/*.min.css

# Règles générant des faux positifs sur les fichiers Blazor code-behind (.razor.cs)
# SonarQube analyse .razor.cs sans voir le .razor correspondant (classe partielle)
sonar.issue.ignore.multicriteria=blazor1,blazor2

# S4487 : "Unread private field" — les champs sont lus dans le .razor (template)
sonar.issue.ignore.multicriteria.blazor1.ruleKey=csharpsquid:S4487
sonar.issue.ignore.multicriteria.blazor1.resourceKey=**/*.razor.cs

# S1144 : "Unused private member" — idem, méthodes appelées depuis le .razor
sonar.issue.ignore.multicriteria.blazor2.ruleKey=csharpsquid:S1144
sonar.issue.ignore.multicriteria.blazor2.resourceKey=**/*.razor.cs
